services:
  postgres:
    image: postgres:15
    container_name: evolution-postgres
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_default

volumes:
  evolution_postgres_data:

networks:
  evolution_default:
    external: true
