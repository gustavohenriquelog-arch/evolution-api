services:
  evolution-go:
    image: evoapicloud/evolution-go:latest
    container_name: evolution-go
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - DB_TYPE=postgres
      - DB_HOST=evolution-postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=evolution_go
      - SERVER_PORT=8080
    networks:
      - evolution_default

networks:
  evolution_default:
    external: true
